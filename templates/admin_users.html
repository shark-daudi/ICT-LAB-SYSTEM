{% extends "layout.html" %}
{% block title %}Manage Users{% endblock %}
{% block content %}
<div class="card">
  <div class="card-header d-flex justify-content-between"><span>User Management</span><button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openAddUser()"><i class="bi bi-plus"></i> Add User</button></div>
  <div class="card-body"><div class="table-responsive"><table class="table" id="users-table"><thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Category</th><th>Actions</th></tr></thead><tbody></tbody></table></div></div>
</div>
<div class="modal fade" id="userModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5 id="userModalTitle">Add User</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="hidden" id="userId"><div class="mb-2"><label>Username</label><input id="userUsername" class="form-control" required></div><div class="mb-2"><label>Email</label><input id="userEmail" class="form-control" required></div><div class="mb-2"><label>Password</label><input type="password" id="userPassword" class="form-control"></div><div class="mb-2"><label>Role</label><select id="userRole" class="form-select">{% for r in roles %}<option value="{{ r.name }}">{{ r.name }}</option>{% endfor %}</select></div><div class="mb-2" id="categoryDiv" style="display:none"><label>Category</label><select id="userCategory" class="form-select"><option value="teacher">Teacher</option><option value="student">Student</option><option value="non_teaching_staff">Non-teaching Staff</option><option value="guest">Guest</option></select></div></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" id="saveUserBtn">Save</button></div></div></div></div>
<script>
  let users = [];
  function loadUsers() { fetch('/api/users').then(r=>r.json()).then(data=>{ users=data; document.querySelector('#users-table tbody').innerHTML=data.map(u=>`<tr><td>${u.id}</td><td>${escapeHtml(u.username)}</td><td>${escapeHtml(u.email)}</td><td>${u.role}</td><td>${u.category||''}</td><td><button class="btn btn-sm btn-warning" onclick="editUser(${u.id})">Edit</button> <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">Delete</button></td></tr>`).join(''); }); }
  function openAddUser() { document.getElementById('userModalTitle').innerText='Add User'; document.getElementById('userId').value=''; document.getElementById('userUsername').value=''; document.getElementById('userEmail').value=''; document.getElementById('userPassword').value=''; document.getElementById('userRole').value='Requester'; toggleCategory(); new bootstrap.Modal(document.getElementById('userModal')).show(); }
  function editUser(id){ const u=users.find(u=>u.id==id); if(u){ document.getElementById('userModalTitle').innerText='Edit User'; document.getElementById('userId').value=u.id; document.getElementById('userUsername').value=u.username; document.getElementById('userEmail').value=u.email; document.getElementById('userPassword').value=''; document.getElementById('userRole').value=u.role; toggleCategory(); if(u.category) document.getElementById('userCategory').value=u.category; new bootstrap.Modal(document.getElementById('userModal')).show(); } }
  function toggleCategory(){ const role=document.getElementById('userRole').value; document.getElementById('categoryDiv').style.display = (role==='Requester')?'block':'none'; }
  document.getElementById('userRole').addEventListener('change', toggleCategory);
  document.getElementById('saveUserBtn').onclick = async () => {
    const id = document.getElementById('userId').value;
    const data = { username: document.getElementById('userUsername').value, email: document.getElementById('userEmail').value, role_name: document.getElementById('userRole').value };
    if(document.getElementById('userPassword').value) data.password = document.getElementById('userPassword').value;
    if(data.role_name === 'Requester') data.category = document.getElementById('userCategory').value;
    const url = id ? `/api/users/${id}` : '/api/users';
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, {method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    if(res.ok) { bootstrap.Modal.getInstance(document.getElementById('userModal')).hide(); loadUsers(); showToast('User saved','success'); }
    else { const err = await res.json(); showToast(err.error || 'Error','danger'); }
  };
  async function deleteUser(id){ if(confirm('Delete user?')){ const res=await fetch(`/api/users/${id}`,{method:'DELETE'}); if(res.ok){ loadUsers(); showToast('User deleted','success'); } else { const err=await res.json(); showToast(err.error,'danger'); } } }
  function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  loadUsers();
</script>
{% endblock %}
